name: Build Mobile Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build mobile arm64 debug APK
        run: ./gradlew :app:assembleMobileArm64_v8aDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tvnow-mobile-arm64-debug
          path: app/build/outputs/apk/mobile/arm64_v8a/debug/*.apk
