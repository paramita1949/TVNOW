name: Build Mobile Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  BASE_VERSION_CODE: 552
  BASE_VERSION_NAME: 5.5.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Prepare version
        run: |
          echo "VERSION_CODE=$((BASE_VERSION_CODE * 1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${BASE_VERSION_NAME}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build mobile arm64 release APK
        run: ./gradlew :app:assembleMobileArm64_v8aRelease -PciVersionCode="$VERSION_CODE" -PciVersionName="$VERSION_NAME" --stacktrace

      - name: Collect APK
        run: |
          mkdir -p release
          apk="$(find app/build/outputs/apk -path '*/release/*.apk' -type f | head -n 1)"
          test -n "$apk"
          cp "$apk" "release/tvnow-${VERSION_NAME}-mobile-arm64_v8a.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tvnow-mobile-arm64-release
          path: release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_CODE }}
          name: TVNOW ${{ env.VERSION_NAME }}
          body: |
            versionCode: ${{ env.VERSION_CODE }}
            versionName: ${{ env.VERSION_NAME }}
            commit: ${{ github.sha }}
          files: release/*.apk
